name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate custom block registry
        run: npm run gen:custom-blocks

      - name: Type-check
        run: npx tsc --noEmit

      # NOTE: 11 setState-in-effect errors remain (architectural debt — each
      # requires a per-component refactor moving derived state out of effects).
      # .13 fixed the conditional-hook bugs (real React rules-of-hooks
      # violations) but parked the setState-in-effect cleanup for a follow-up.
      # Keep continue-on-error so the warnings stay visible in CI.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test (vitest + jsdom + RTL)
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (with dev extras)
        run: uv sync --extra dev

      # NOTE: pre-existing ruff debt (~45 errors: import ordering, multi-statement
      # Ruff is now hard-fail (sgs-ui-wisp-las.13 cleaned up the pre-existing
      # debt — 45 errors fixed; clean across backend/, custom_blocks/, tests/).
      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest tests/ -ra

  forbidden-tokens:
    name: Forbidden-token gate
    runs-on: ubuntu-latest
    # Hard-fail since sgs-ui-wisp-las.9 cleaned up the public code paths.
    # Private blocks (gitignored) + generated_private/ output are skipped.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run gate
        run: python scripts/check_no_forbidden_tokens.py custom_blocks backend frontend/src
